@let currentFilm = _currentFilm();

<app-breadcrumb [items]="_breadcrumbs()" />

<section class="mbs-2">
  <app-link class="-ms-3.5" [text]="'Back'" [icon]="'arrow-back'" [routerLink]="'/'" />

  <div class="flex flex-col md:flex-row gap-10 mbs-2">
    @if (currentFilm) {
      <div class="order-2">
        <header>
          <div class="flex items-center gap-2 text-3xl">
            <h2 data-test="title">
              {{ currentFilm.title }}
              <time class="font-light" data-test="year" [attr.datetime]="currentFilm.year"
                >({{ currentFilm.year }})</time
              >
            </h2>
          </div>

          <ul class="flex gap-2 mbs-1 list-disc">
            <li class="list-none" data-test="genre">{{ currentFilm.genre }}</li>

            <li class="ms-4" data-test="duration">{{ currentFilm.duration | duration }}</li>
          </ul>

          <span class="inline-flex gap-1 mbs-1" data-test="rating"
            ><app-icon class="text-amber-500" [name]="'kid-star'" />
            {{ currentFilm.rating | number: '1.1-1' }}
          </span>
        </header>

        <div class="mbs-5">
          <h3 class="text-xl">Overview</h3>

          <p class="mbs-1" data-test="description">{{ currentFilm.description }}</p>
        </div>
      </div>

      <img
        ngSrc="{{ currentFilm.posterUrl }}"
        class="order-1 object-cover mx-auto"
        width="414"
        height="612"
        alt="Poster"
        data-test="poster"
        priority
      />
    } @else {
      <app-empty
        class="my-17 md:my-34 mx-auto"
        [heading]="'Nothing found'"
        [description]="'The movie you\'re looking for might have been removed or&nbsp;the link is&nbsp;incorrect.\nTry browsing our catalog instead'"
        [icon]="'cancel'"
      />
    }
  </div>
</section>
